<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dasbor Juri - Vibe Coding Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #13131a;
        --surface2: #1c1c26;
        --border: #2a2a3a;
        --accent: #7c6bff;
        --accent2: #ff6b9d;
        --accent3: #6bffca;
        --text: #f0f0f8;
        --muted: #6b6b8a;
        --mono: 'Space Mono', monospace;
        --sans: 'DM Sans', sans-serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.4;
      }
      .shell {
        position: relative;
        z-index: 1;
        max-width: 780px;
        margin: 0 auto;
        padding: 2rem 1.25rem;
      }
      header {
        padding: 2rem 0 1.5rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 2rem;
      }
      .logo {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--accent2);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }
      h1 span {
        color: var(--accent2);
      }
      .tagline {
        font-size: 14px;
        color: var(--muted);
        margin-top: 0.4rem;
        font-weight: 300;
      }
      .tabs {
        display: flex;
        gap: 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 3px;
        background: var(--surface);
        margin-bottom: 1.75rem;
      }
      .tab-btn {
        flex: 1;
        padding: 8px 14px;
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 500;
        border: none;
        background: none;
        color: var(--muted);
        cursor: pointer;
        border-radius: 7px;
        transition: all 0.2s;
      }
      .tab-btn.active {
        background: var(--accent2);
        color: #fff;
      }
      .tab-btn:hover:not(.active) {
        color: var(--text);
        background: var(--surface2);
      }
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }
      .p-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 0.75rem;
      }
      .p-card.scored {
        border-color: #6bffca40;
      }
      .p-head {
        display: flex;
        align-items: start;
        gap: 10px;
        margin-bottom: 0.75rem;
      }
      .p-name {
        font-size: 15px;
        font-weight: 600;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 11px;
        font-family: var(--mono);
        font-weight: 700;
      }
      .badge.scored {
        background: #6bffca20;
        color: var(--accent3);
        border: 1px solid #6bffca40;
      }
      .badge.pending {
        background: #ff6b9d20;
        color: var(--accent2);
        border: 1px solid #ff6b9d40;
      }
      .badge.nim {
        background: #7c6bff20;
        color: #a89cff;
        border: 1px solid #7c6bff40;
      }
      .p-meta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      .p-desc {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 0.75rem;
        line-height: 1.6;
      }
      .p-links {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 0.75rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        background: var(--surface2);
        color: var(--text);
        font-family: var(--sans);
        text-decoration: none;
      }
      .btn:hover {
        border-color: var(--accent2);
        color: var(--accent2);
      }
      .btn.primary {
        background: var(--accent2);
        border-color: var(--accent2);
        color: #fff;
      }
      .btn.danger {
        border-color: #ff4444;
        color: #ff4444;
      }
      .btn.danger:hover {
        background: #ff444411;
      }
      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1rem 0;
      }
      .score-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin: 0.75rem 0;
      }
      .score-box {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        text-align: center;
      }
      .score-box.bonus {
        border-color: var(--accent3);
        background: #6bffca05;
      }
      .score-box .slabel {
        font-size: 10px;
        color: var(--muted);
        font-family: var(--mono);
        text-transform: uppercase;
      }
      .score-box.bonus .slabel {
        color: var(--accent3);
      }
      .score-box .smax {
        font-size: 9px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .score-box input {
        width: 100%;
        max-width: 56px;
        text-align: center;
        padding: 4px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: var(--mono);
        font-size: 16px;
        font-weight: 700;
        outline: none;
      }
      .total-display {
        text-align: center;
        margin: 0.5rem 0;
        font-family: var(--mono);
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--accent3);
      }
      .total-display span {
        font-size: 14px;
        color: var(--muted);
      }
      .alert {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 1rem;
        font-family: var(--mono);
      }
      .alert.ok {
        background: #6bffca15;
        border: 1px solid var(--accent3);
        color: var(--accent3);
      }
      .alert.err {
        background: #ff444415;
        border: 1px solid #ff4444;
        color: #ff7777;
      }
      .lb-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 1rem 1.25rem;
        border-radius: 10px;
        margin-bottom: 0.5rem;
        border: 1px solid var(--border);
        background: var(--surface);
      }
      .lb-rank {
        font-family: var(--mono);
        font-size: 1.4rem;
        font-weight: 700;
        width: 36px;
        text-align: center;
      }
      .lb-rank.r1 {
        color: var(--accent2);
      }
      .lb-info {
        flex: 1;
      }
      .lb-name {
        font-size: 15px;
        font-weight: 600;
      }
      .lb-app {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .lb-breakdown {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
        background: var(--surface2);
        padding: 4px 8px;
        border-radius: 4px;
        display: inline-block;
      }
      .lb-score {
        font-family: var(--mono);
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--accent2);
      }
      .empty {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--muted);
      }
      .empty .icon {
        font-size: 2.5rem;
        opacity: 0.3;
        margin-bottom: 0.5rem;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .spacer {
        flex: 1;
      }
      @media (max-width: 500px) {
        .score-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="logo">Panel Administrasi Juri</div>
        <h1>Vibe <span>Judgement</span> Dashboard</h1>
        <p class="tagline">Gunakan panel ini khusus untuk melakukan penilaian portofolio MVP peserta.</p>
      </header>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard', this)">Dasbor Penilaian Juri</button>
        <button class="tab-btn" onclick="switchTab('leaderboard', this)">Papan Peringkat Ringkas</button>
      </div>

      <div id="page-dashboard" class="page active">
        <div id="dash-alert"></div>
        <div class="row" style="margin-bottom: 1rem">
          <span style="font-size: 14px; font-weight: 600">Daftar Antrean Penilaian</span>
          <div class="spacer"></div>
          <button class="btn sm" onclick="loadDashboard()">Segarkan Data</button>
          <button class="btn sm danger" onclick="resetData()">Atur Ulang (Reset)</button>
        </div>
        <div id="dash-list"></div>
      </div>

      <div id="page-leaderboard" class="page">
        <div class="row" style="margin-bottom: 1rem">
          <span style="font-size: 14px; font-weight: 600">Peringkat Kumulatif Juri</span>
          <div class="spacer"></div>
          <button class="btn sm" onclick="loadLeaderboard()">Segarkan Data</button>
        </div>
        <div id="lb-list"></div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
      import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: 'AIzaSyAAcZudcr-G7LLFF6eJ__2HSIwj9dOrCNU',
        authDomain: 'penilaian-vibe-coding.firebaseapp.com',
        databaseURL: 'https://penilaian-vibe-coding-default-rtdb.asia-southeast1.firebasedatabase.app',
        projectId: 'penilaian-vibe-coding',
        storageBucket: 'penilaian-vibe-coding.firebasestorage.app',
        messagingSenderId: '138677485489',
        appId: '1:138677485489:web:223467c00f322f8a3f4790',
        measurementId: 'G-GJRK5YGZGX',
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const COL = 'participants';

      function showAlert(id, msg, type = 'ok') {
        const el = document.getElementById(id);
        el.innerHTML = `<div class="alert ${type}">${msg}</div>`;
        if (type !== 'err') setTimeout(() => (el.innerHTML = ''), 4000);
      }

      function switchTab(name, btn) {
        document.querySelectorAll('.tab-btn').forEach((t) => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach((p) => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('page-' + name).classList.add('active');
        if (name === 'dashboard') loadDashboard();
        if (name === 'leaderboard') loadLeaderboard();
      }
      window.switchTab = switchTab;

      async function loadDashboard() {
        const list = document.getElementById('dash-list');
        list.innerHTML = '<p style="color:var(--muted);font-size:14px">Memuat data submission...</p>';
        try {
          const snap = await getDocs(collection(db, COL));
          if (snap.empty) {
            list.innerHTML = '<div class="empty"><div class="icon">📭</div><p>Belum ada pengumpulan karya dari peserta.</p></div>';
            return;
          }

          list.innerHTML = snap.docs
            .map((d) => {
              const p = d.data();
              const id = d.id;
              const total = (p.skorFungsi ?? 0) + (p.skorKreatif ?? 0) + (p.skorAI ?? 0) + (p.skorBonus ?? 0);
              return `
      <div class="p-card ${p.scored ? 'scored' : ''}" id="pc-${id}">
        <div class="p-head">
          <div style="flex:1">
            <div class="p-name">${p.nama} <span class="badge nim">${p.nim}</span> ${p.scored ? '<span class="badge scored">Telah Dinilai</span>' : '<span class="badge pending">Menunggu Penilaian</span>'}</div>
            <div class="p-meta">Waktu Pengumpulan: ${p.submittedAt} · Kombinasi AI: ${p.ai}</div>
          </div>
        </div>
        <div class="p-desc"><strong>${p.appname}</strong> — ${p.desc}</div>
        <div class="p-links">
          <a href="${p.deploy}" target="_blank" class="btn sm">Buka Tautan Aplikasi ↗</a>
          <a href="${p.ailink}" target="_blank" class="btn sm">Buka Tautan Log AI ↗</a>
        </div>
        ${p.cara ? `<p style="font-size:12px;color:var(--muted);margin-bottom:.75rem">Instruksi Pengujian: ${p.cara}</p>` : ''}
        <div class="divider"></div>
        <div class="score-grid">
          <div class="score-box"><div class="slabel">Fungsi MVP</div><div class="smax">0–45</div><input type="number" id="sf-${id}" min="0" max="45" value="${p.skorFungsi ?? ''}" placeholder="–"></div>
          <div class="score-box"><div class="slabel">Kreativitas</div><div class="smax">0–25</div><input type="number" id="sk-${id}" min="0" max="25" value="${p.skorKreatif ?? ''}" placeholder="–"></div>
          <div class="score-box"><div class="slabel">Logika AI</div><div class="smax">0–20</div><input type="number" id="sa-${id}" min="0" max="20" value="${p.skorAI ?? ''}" placeholder="–"></div>
          <div class="score-box bonus"><div class="slabel">Poin Bonus</div><div class="smax">0–10</div><input type="number" id="sb-${id}" min="0" max="10" value="${p.skorBonus ?? ''}" placeholder="–"></div>
        </div>
        ${p.scored ? `<div class="total-display">${total} <span>/ 100</span></div>` : ''}
        <div class="row" style="margin-top:.75rem;gap:8px">
          <div class="spacer"></div>
          <button class="btn sm primary" onclick="simpanNilai('${id}','${p.nama}')">Konfirmasi Penilaian</button>
        </div>
        <div id="alert-${id}"></div>
      </div>`;
            })
            .join('');
        } catch (e) {
          list.innerHTML = '<div class="alert err">Gagal memuat basis data. Periksa Firebase config.</div>';
        }
      }
      window.loadDashboard = loadDashboard;
      window.onload = loadDashboard;

      async function simpanNilai(id, nama) {
        const sf = parseInt(document.getElementById(`sf-${id}`).value);
        const sk = parseInt(document.getElementById(`sk-${id}`).value);
        const sa = parseInt(document.getElementById(`sa-${id}`).value);
        const sbStr = document.getElementById(`sb-${id}`).value;
        const sb = sbStr === '' ? 0 : parseInt(sbStr);

        if (isNaN(sf) || isNaN(sk) || isNaN(sa) || isNaN(sb)) {
          document.getElementById(`alert-${id}`).innerHTML = '<div class="alert err" style="margin-top:8px">Mohon lengkapi parameter skor dasar.</div>';
          return;
        }
        if (sf < 0 || sf > 45 || sk < 0 || sk > 25 || sa < 0 || sa > 20 || sb < 0 || sb > 10) {
          document.getElementById(`alert-${id}`).innerHTML = '<div class="alert err" style="margin-top:8px">Skor melebihi batas parameter rubrik.</div>';
          return;
        }

        await updateDoc(doc(db, COL, id), { skorFungsi: sf, skorKreatif: sk, skorAI: sa, skorBonus: sb, scored: true });
        showAlert('dash-alert', `Data Penilaian untuk peserta ${nama} telah direkam! Total: ${sf + sk + sa + sb}/100`);
        loadDashboard();
      }
      window.simpanNilai = simpanNilai;

      async function loadLeaderboard() {
        const lb = document.getElementById('lb-list');
        lb.innerHTML = '<p style="color:var(--muted);font-size:14px">Memuat data peringkat...</p>';
        const snap = await getDocs(collection(db, COL));
        if (snap.empty) {
          lb.innerHTML = '<div class="empty"><div class="icon">🏆</div><p>Belum ada data peringkat.</p></div>';
          return;
        }

        const all = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        const scored = all
          .filter((p) => p.scored)
          .sort((a, b) => {
            return b.skorFungsi + b.skorKreatif + b.skorAI + (b.skorBonus ?? 0) - (a.skorFungsi + a.skorKreatif + a.skorAI + (a.skorBonus ?? 0));
          });

        const rankClass = (i) => (i === 0 ? 'r1' : '');
        const rankSymbol = (i) => `#${i + 1}`;

        lb.innerHTML = scored.length
          ? scored
              .map((p, i) => {
                const bonusLabel = p.skorBonus > 0 ? ` + B:${p.skorBonus}` : '';
                const totalSkor = p.skorFungsi + p.skorKreatif + p.skorAI + (p.skorBonus ?? 0);
                return `
    <div class="lb-item ${i === 0 ? 'top1' : ''}">
      <div class="lb-rank ${rankClass(i)}">${rankSymbol(i)}</div>
      <div class="lb-info">
        <div class="lb-name">${p.nama}</div>
        <div class="lb-app">${p.appname} · [${p.ai}]</div>
        <div class="lb-breakdown">F:${p.skorFungsi} + K:${p.skorKreatif} + AI:${p.skorAI}${bonusLabel}</div>
      </div>
      <div class="lb-score">${totalSkor}</div>
    </div>`;
              })
              .join('')
          : '<div class="empty"><div class="icon">⏳</div><p>Sistem sedang menunggu penyelesaian proses penilaian juri.</p></div>';
      }
      window.loadLeaderboard = loadLeaderboard;

      async function resetData() {
        if (!confirm('Peringatan: Aksi ini akan menghapus permanen seluruh data peserta dan skor dari basis data. Lanjutkan?')) return;
        const snap = await getDocs(collection(db, COL));
        await Promise.all(snap.docs.map((d) => deleteDoc(doc(db, COL, d.id))));
        showAlert('dash-alert', 'Basis data berhasil dibersihkan.', 'info');
        loadDashboard();
      }
      window.resetData = resetData;
    </script>
  </body>
</html>
